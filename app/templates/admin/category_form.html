{% extends 'admin/base.html' %}
{% block title %}{{ 'Edit' if action == 'edit' else 'Create' }} Category{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>
    <i class="fas fa-folder-plus me-2"></i>
    {{ 'Edit Category' if action == 'edit' else 'Create Category' }}
  </h2>
  <a href="{{ url_for('admin.category_list') }}" class="btn btn-outline-secondary">
    <i class="fas fa-arrow-left me-1"></i> Back
  </a>
</div>

<div class="row">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Name (English) <span class="text-danger">*</span></label>
              <input type="text" name="name_en" class="form-control"
                     value="{{ category.name_en if category else '' }}"
                     placeholder="Category Name" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">نام (فارسی)</label>
              <input type="text" name="name_fa" class="form-control" dir="rtl"
                     value="{{ category.name_fa if category else '' }}"
                     placeholder="نام دسته‌بندی"/>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">Parent Category</label>
              <select name="parent_id" class="form-select">
                <option value="">— None (Top Level) —</option>
                {% for cat in all_cats %}
                  {% if not cat.parent_id %}
                  <option value="{{ cat._id }}"
                    {{ 'selected' if category and category.parent_id and category.parent_id | string == cat._id | string }}>
                    {{ cat.name_en }}
                  </option>
                  {% endif %}
                {% endfor %}
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Order</label>
              <input type="number" name="order" class="form-control"
                     value="{{ category.order if category else 0 }}" min="0"/>
            </div>
            <div class="col-md-3 d-flex align-items-end">
              <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" name="is_active" id="isActive"
                       {{ 'checked' if not category or category.is_active }}>
                <label class="form-check-label" for="isActive">Active</label>
              </div>
            </div>

            <div class="col-12">
              <label class="form-label fw-bold">Description (English)</label>
              <textarea name="description_en" class="form-control" rows="3"
                        placeholder="Optional description...">{{ category.description_en if category else '' }}</textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">توضیحات (فارسی)</label>
              <textarea name="description_fa" class="form-control" rows="3" dir="rtl"
                        placeholder="توضیحات اختیاری...">{{ category.description_fa if category else '' }}</textarea>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save me-2"></i>
              {{ 'Update Category' if action == 'edit' else 'Create Category' }}
            </button>
            <a href="{{ url_for('admin.category_list') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
